services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: repnexa
      POSTGRES_USER: repnexa
      POSTGRES_PASSWORD: repnexa
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repnexa -d repnexa"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/repnexa
      SPRING_DATASOURCE_USERNAME: repnexa
      SPRING_DATASOURCE_PASSWORD: repnexa
      REPNEXA_SESSION_COOKIE_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      API_ORIGIN: http://backend:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"
